<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>月月贷 - 我的额度</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
      -webkit-tap-highlight-color:transparent;
      -webkit-text-size-adjust:100%;
      background:#F5F6FA;
      color:#333;
      display:flex;flex-direction:column;
      min-height:100vh;
      min-height:100dvh;
    }

    /* ===== 头部 ===== */
    .head{
      background:linear-gradient(160deg,#3B82F6,#2563EB 40%,#1D4ED8);
      padding:28px 20px 56px;
      color:#fff;
      flex-shrink:0;
      position:relative;
      overflow:hidden;
    }
    /* 头部背景光晕 */
    .head::before{
      content:'';position:absolute;
      top:-60px;right:-40px;
      width:180px;height:180px;
      background:radial-gradient(circle,rgba(255,255,255,.12) 0%,transparent 70%);
      border-radius:50%
    }
    .head::after{
      content:'';position:absolute;
      bottom:-30px;left:-50px;
      width:200px;height:200px;
      background:radial-gradient(circle,rgba(255,255,255,.06) 0%,transparent 70%);
      border-radius:50%
    }
    .head-inner{position:relative;z-index:1}
    .head .greeting{font-size:22px;font-weight:700;margin-bottom:2px}
    .head .subtitle{font-size:13px;opacity:.7;margin-bottom:6px}
    .head .phone-display{
      display:inline-block;font-size:12px;opacity:.6;
      background:rgba(255,255,255,.12);padding:3px 12px;border-radius:12px
    }

    /* ===== 主内容 ===== */
    .main{
      flex:1;
      padding:0 16px 16px;
      margin-top:-32px;
      position:relative;z-index:2;
      width:100%;
      max-width:480px;
      margin-left:auto;margin-right:auto;
    }

    /* ===== 额度卡片 ===== */
    .amount-card{
      background:#fff;
      border-radius:20px;
      padding:32px 24px 28px;
      text-align:center;
      box-shadow:0 8px 30px rgba(37,99,235,.1);
      margin-bottom:16px;
      position:relative;
      min-height:220px;
      display:flex;flex-direction:column;justify-content:center;
      gap:10px;
    }
    /* 卡片顶部装饰线 */
    .amount-card::before{
      content:'';
      position:absolute;top:0;left:50%;transform:translateX(-50%);
      width:50px;height:4px;
      background:linear-gradient(90deg,#3B82F6,#8B5CF6);
      border-radius:0 0 4px 4px
    }

    .amount-label{
      font-size:14px;color:#999;font-weight:500;
      margin-bottom:18px;letter-spacing:1px
    }
    .amount-value{
      display:flex;align-items:baseline;justify-content:center;
      margin-bottom:20px
    }
    .amount-symbol{
      font-size:28px;font-weight:600;color:#2563EB;
      margin-right:2px;line-height:1
    }
    .amount-num{
      font-size:clamp(40px,12vw,56px);font-weight:800;color:#111827;
      letter-spacing:0;line-height:1;
      font-variant-numeric:tabular-nums
    }
    .amount-unit{
      font-size:16px;font-weight:400;color:#999;margin-left:4px
    }

    .amount-status{
      display:inline-flex;align-items:center;gap:4px;
      padding:4px 12px;border-radius:12px;
      font-size:12px;font-weight:600;margin:0 0 24px;
    }
    .amount-status.pending{background:#FFF5E6;color:#F97316}
    .amount-status.rejected{background:#FEE2E2;color:#DC2626}

    .amount-btn{
      width:100%;height:52px;border-radius:26px;
      background:linear-gradient(135deg,#3B82F6,#2563EB);
      color:#fff;font-size:17px;font-weight:700;cursor:pointer;border:none;
      box-shadow:0 6px 20px rgba(37,99,235,.3);
      transition:all .2s
    }
    .amount-btn:active{opacity:.9;transform:scale(.97)}

    .rate-info{
      margin-top:18px;font-size:12px;color:#999
    }
    .rate-info .val{color:#F97316;font-weight:700}
    .rate-tag{
      display:inline-block;background:linear-gradient(135deg,#F97316,#F59E0B);
      color:#fff;font-size:10px;padding:2px 7px;border-radius:8px;margin-left:4px;
      vertical-align:middle;font-weight:600
    }

    .amount-expiry{
      margin:8px 0 0;font-size:12px;color:#10B981;
      display:flex;align-items:center;justify-content:center;gap:4px
    }
    .amount-expired{
      margin:8px 0 0;font-size:12px;color:#EF4444;
      background:#FEF2F2;padding:6px 12px;border-radius:8px;
      display:flex;align-items:center;justify-content:center;gap:4px;font-weight:600
    }

    /* ===== 特性栏 ===== */
    .features{
      display:flex;gap:10px;margin-bottom:16px
    }
    .feat-item{
      flex:1;background:#fff;border-radius:14px;
      padding:18px 12px 16px;text-align:center;
      box-shadow:0 2px 10px rgba(0,0,0,.03);
      display:flex;flex-direction:column;align-items:center;
      gap:6px;
      transition:transform .2s,box-shadow .2s
    }
    .feat-item:active{transform:scale(.96);box-shadow:0 4px 16px rgba(37,99,235,.1)}
    .feat-icon{
      width:42px;height:42px;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#EEF2FF,#E0E7FF);
      border-radius:50%;font-size:20px;margin-bottom:2px
    }
    .feat-label{font-size:13px;color:#666;font-weight:600;line-height:1.3}
    .feat-val{
      font-size:11px;color:#8B5CF6;font-weight:500;
      background:#F5F3FF;padding:2px 10px;border-radius:10px;
      letter-spacing:.5px
    }

    /* ===== 预审批状态卡片 ===== */
    .info-card{
      background:linear-gradient(135deg,#F0FDF4,#ECFDF5);
      border:1px solid #86EFAC;border-radius:14px;
      margin-bottom:16px;padding:18px;text-align:center
    }
    .info-card .info-title{font-size:14px;font-weight:700;margin-bottom:10px;color:#166534}
    .approve-badge{font-size:18px;font-weight:700;color:#15803D;margin-bottom:6px}
    .approve-desc{font-size:13px;color:#64748B}

    /* ===== 提示区域 ===== */
    .tips{
      margin-bottom:16px;
      background:#EEF2FF;border-radius:12px;
      padding:12px 14px;font-size:12px;color:#4F46E5;
      display:flex;align-items:flex-start;gap:8px;line-height:1.5;
    }
    .tips-icon{font-size:15px;flex-shrink:0;margin-top:1px}

    /* ===== 底部 ===== */
    .footer{
      text-align:center;
      padding:8px 0 calc(20px + env(safe-area-inset-bottom));
      font-size:11px;color:#ccc;flex-shrink:0
    }

    /* Toast */
    .toast{
      position:fixed;top:max(60px,env(safe-area-inset-top) + 10px);left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,.78);color:#fff;padding:10px 22px;
      border-radius:20px;font-size:14px;z-index:999;pointer-events:none;
      opacity:0;transition:opacity .3s;white-space:nowrap;max-width:80vw
    }
    .toast.show{opacity:1}
  </style>
</head>
<body>

  <div class="toast" id="toast"></div>

  <!-- 头部 -->
  <div class="head">
    <div class="head-inner">
      <div class="greeting" id="greeting">👋 欢迎回来</div>
      <div class="subtitle">月月贷 · 让借贷更简单</div>
      <div class="phone-display" id="phoneShow"></div>
    </div>
  </div>

  <!-- 主内容 -->
  <div class="main">
    <!-- 额度卡片 -->
    <div class="amount-card" id="amountCard"></div>

    <!-- 特性栏 -->
    <div class="features">
      <div class="feat-item">
        <span class="feat-icon">⚡</span>
        <span class="feat-label">智能审批</span>
        <span class="feat-val">最快 30 秒</span>
      </div>
      <div class="feat-item">
        <span class="feat-icon">💰</span>
        <span class="feat-label">最高额度</span>
        <span class="feat-val">100 万元</span>
      </div>
      <div class="feat-item">
        <span class="feat-icon">🔒</span>
        <span class="feat-label">银行级加密</span>
        <span class="feat-val">信息保密</span>
      </div>
    </div>

    <!-- 审批状态 -->
    <div class="info-card" id="infoCard" style="display:none">
      <div class="info-title">📋 审批状态</div>
      <div id="infoContent"></div>
    </div>

    <!-- 提示 -->
    <div class="tips" id="tipsBox">
      <span class="tips-icon">💡</span>
      <span id="tipsText">填写完整资料可获得更高额度评估。</span>
    </div>
  </div>

  <div class="footer">月月贷 版权所有 © 2026</div>

<script src="home.js?v=2"></script>
</body>
</html>
